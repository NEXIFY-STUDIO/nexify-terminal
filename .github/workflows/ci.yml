name: CI

on:
  push:
    branches: [main, 'feature/**', 'cursor/**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - name: Install deps
        run: |
          pnpm config set strict-dep-builds false
          pnpm install --frozen-lockfile
          npm install --prefix services/hacking-api --ignore-scripts
          npm install --prefix services/ai-proxy --ignore-scripts
      - name: Bootstrap CI env
        run: cp .env.ci .env.local
      - name: Typecheck
        run: pnpm run lint
      - name: Start AI proxy (integration smoke)
        run: |
          node services/ai-proxy/ai-proxy.mjs &
          sleep 2
        env:
          AI_PROXY_PORT: 8788
          AI_PROVIDER: mistral
          MISTRAL_API_KEY: ci-smoke-placeholder
      - name: Test suite
        run: pnpm run test:all
        env:
          AI_PROXY_PORT: 8788