# ─────────────────────────────────────────────────────────────────────────────
# Nexify Hacking API — nginx reverse-proxy snippet
#
# Place this file in:  /etc/nginx/sites-available/nexify-hack-api
# Then enable:         ln -s /etc/nginx/sites-available/nexify-hack-api \
#                             /etc/nginx/sites-enabled/
#                      nginx -t && systemctl reload nginx
#
# This is the bootstrap HTTP config.
# Copy it first, then run certbot --nginx --redirect to add TLS automatically.
# ─────────────────────────────────────────────────────────────────────────────

# ── HTTP reverse proxy (certbot will later extend this with TLS) ────────────
server {
    listen 80;
    listen [::]:80;
    server_name hack-api.isteroidi.it;          # ← change if needed

    # Security headers
    add_header X-Content-Type-Options   "nosniff"       always;
    add_header X-Frame-Options          "DENY"          always;
    add_header Referrer-Policy          "no-referrer"   always;

    # SSE needs buffering disabled so events reach the browser immediately
    proxy_buffering          off;
    proxy_cache              off;
    proxy_read_timeout       300s;   # match longest tool timeout (sqlmap 180s)
    proxy_send_timeout       300s;
    proxy_connect_timeout    10s;

    location /api/hack/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE — keep connection alive, no gzip
        proxy_set_header   Connection        '';
        chunked_transfer_encoding on;
        gzip               off;
    }

    location /health {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Block everything else
    location / {
        return 404;
    }
}
